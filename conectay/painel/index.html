<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ConectaY · Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{
  --azul:#0ea5e9; --ciano:#22d3ee; --navy:#070b16; --vidro:rgba(16,24,39,.72); --vidro2:rgba(13,21,36,.9);
  --borda:#1e293b; --bordaHi:#2b3b55; --texto:#e2e8f0; --mudo:#8b9bb4; --fraco:#5b6b84;
  --ok:#34d399; --alerta:#fbbf24; --erro:#f87171; --grad:linear-gradient(135deg,#0ea5e9,#22d3ee);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--texto);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(900px 500px at 85% -10%, rgba(14,165,233,.13), transparent 60%),
             radial-gradient(700px 500px at -10% 110%, rgba(34,211,238,.08), transparent 60%)}
h1,h2,h3,.marca{font-family:'Sora','Inter',sans-serif}
a{color:var(--ciano);text-decoration:none}
button{font-family:inherit;cursor:pointer;transition:.18s}
input,select,textarea{font-family:inherit;background:#0b1220;border:1px solid var(--borda);color:var(--texto);
  border-radius:11px;padding:10px 13px;font-size:.9rem;outline:none;width:100%;transition:.18s}
input:focus,select:focus,textarea:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
label{font-size:.75rem;color:var(--mudo);display:block;margin:12px 0 6px;font-weight:500}
::placeholder{color:var(--fraco)}
small.dica{color:var(--fraco);font-size:.7rem;display:block;margin-top:4px}

#telaLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.cardLogin{width:100%;max-width:390px;background:var(--vidro);backdrop-filter:blur(14px);
  border:1px solid var(--borda);border-radius:22px;padding:38px 30px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.hex{width:62px;height:62px;margin:0 auto 16px;display:block}
.cardLogin h1{text-align:center;font-size:1.45rem;margin-bottom:4px}
.cardLogin .sub{text-align:center;color:var(--mudo);font-size:.84rem;margin-bottom:18px}
.btnP{width:100%;margin-top:18px;padding:13px;border:0;border-radius:12px;font-weight:700;color:#fff;font-size:.95rem;
  background:var(--grad);box-shadow:0 10px 26px rgba(14,165,233,.35)}
.btnP:hover{transform:translateY(-1px)}
.msgErro{background:#3b0d0d;border:1px solid #7f1d1d;color:#fecaca;border-radius:11px;padding:10px;
  font-size:.82rem;margin-top:14px;display:none}

#app{display:none;min-height:100vh}
.shell{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
aside{background:var(--vidro2);backdrop-filter:blur(12px);border-right:1px solid var(--borda);
  padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
aside .marca{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.05rem;padding:0 10px 20px}
aside .marca b{color:var(--azul)}
aside .rotulo{font-size:.65rem;letter-spacing:.12em;color:var(--fraco);padding:14px 12px 6px;text-transform:uppercase}
.navItem{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;border:0;background:transparent;
  color:var(--mudo);font-size:.88rem;font-weight:500;width:100%;text-align:left}
.navItem svg{flex:none;opacity:.85}
.navItem:hover{background:rgba(14,165,233,.08);color:var(--texto)}
.navItem.on{background:linear-gradient(90deg,rgba(14,165,233,.18),rgba(34,211,238,.06));
  color:#fff;box-shadow:inset 2px 0 0 var(--azul)}
.navItem .pill{margin-left:auto;background:var(--grad);color:#04202e;border-radius:99px;font-size:.66rem;font-weight:700;padding:2px 8px}
aside .rodape{margin-top:auto;padding:12px;border-top:1px solid var(--borda)}
aside .rodape .quem{font-size:.78rem;font-weight:600}
aside .rodape .papel{font-size:.68rem;color:var(--fraco)}
.btnSair{margin-top:10px;width:100%;background:transparent;border:1px solid var(--borda);color:var(--mudo);
  border-radius:9px;padding:8px;font-size:.78rem}
.btnSair:hover{border-color:var(--erro);color:var(--erro)}

.conteudo{padding:26px 30px;max-width:1240px;width:100%}
.topo{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.topo h1{font-size:1.3rem}
.topo .data{color:var(--fraco);font-size:.8rem}
.topo .fim{margin-left:auto;display:flex;gap:10px;align-items:center}
#seletorLoja{width:auto;min-width:190px;background:var(--vidro)}

.card{background:var(--vidro);backdrop-filter:blur(10px);border:1px solid var(--borda);border-radius:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:13px;margin-bottom:20px}
.kpi{padding:17px 18px}
.kpi .ic{width:34px;height:34px;border-radius:10px;background:rgba(14,165,233,.14);display:flex;
  align-items:center;justify-content:center;margin-bottom:12px;color:var(--ciano)}
.kpi .v{font-family:'Sora';font-size:1.7rem;font-weight:700;letter-spacing:-.02em}
.kpi .l{color:var(--mudo);font-size:.74rem;margin-top:2px}
.kpi .delta{font-size:.7rem;margin-top:7px;display:inline-flex;gap:4px;border-radius:99px;padding:3px 9px;font-weight:600}
.delta.up{background:rgba(52,211,153,.12);color:var(--ok)}
.delta.down{background:rgba(248,113,113,.12);color:var(--erro)}
.graficos{display:grid;grid-template-columns:repeat(12,1fr);gap:13px}
.gCard{padding:18px}
.gCard h3{font-size:.8rem;color:var(--mudo);margin-bottom:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.gCard h3::before{content:'';width:7px;height:7px;border-radius:99px;background:var(--grad)}
.gCard canvas{max-height:215px}
.g-8{grid-column:span 8}.g-6{grid-column:span 6}.g-4{grid-column:span 4}
@media(max-width:900px){.g-8,.g-6,.g-4{grid-column:span 12}}

.filtros{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:16px;align-items:end}
.filtros>div{flex:1;min-width:150px}
.filtros .acao{flex:none;display:flex;gap:8px}
.btnG{background:var(--vidro);border:1px solid var(--borda);color:var(--mudo);border-radius:10px;
  padding:10px 15px;font-size:.82rem;font-weight:500}
.btnG:hover{border-color:var(--azul);color:var(--texto)}
.btnFb{background:rgba(24,95,165,.2);border-color:#185fa5;color:#85b7eb}
.tWrap{overflow-x:auto;border-radius:16px;border:1px solid var(--borda)}
table{width:100%;border-collapse:collapse;background:var(--vidro)}
th,td{padding:12px 15px;text-align:left;font-size:.84rem;border-bottom:1px solid var(--borda);white-space:nowrap}
th{color:var(--fraco);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;background:var(--vidro2)}
tbody tr:hover{background:rgba(14,165,233,.05)}
tr:last-child td{border-bottom:0}
.tag{display:inline-block;background:#12304a;color:var(--ciano);border-radius:99px;padding:2px 9px;font-size:.68rem;margin:1px}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:3px 11px;font-size:.7rem;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:99px;background:currentColor}
.b-novo{background:rgba(125,211,252,.12);color:#7dd3fc}
.b-recorrente{background:rgba(110,231,183,.12);color:#6ee7b7}
.b-saudade{background:rgba(252,211,77,.12);color:#fcd34d}
.b-inativo{background:rgba(253,164,175,.12);color:#fda4af}
.b-aniversario{background:rgba(196,181,253,.14);color:#c4b5fd}
.b-vip{background:rgba(252,211,77,.12);color:#fcd34d}
.b-ativo{background:rgba(110,231,183,.12);color:#6ee7b7}
.b-bloqueado{background:rgba(253,164,175,.12);color:#fda4af}

.cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.cats button{border:1px solid var(--borda);background:var(--vidro);color:var(--mudo);border-radius:99px;
  padding:9px 16px;font-size:.8rem;font-weight:600}
.cats button.on{border-color:transparent;color:#04202e;background:var(--grad)}
.disparo{padding:17px 19px;margin-bottom:12px;display:flex;gap:15px;flex-wrap:wrap;align-items:center}
.disparo .avatar{width:42px;height:42px;border-radius:12px;background:rgba(14,165,233,.14);color:var(--ciano);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Sora';flex:none}
.disparo .info{flex:1;min-width:230px}
.disparo .msg{color:var(--mudo);font-size:.84rem;margin-top:7px;line-height:1.55;
  background:rgba(11,18,32,.6);border:1px solid var(--borda);border-radius:0 12px 12px 12px;padding:10px 13px}
.btnZap{background:#16a34a;border:0;color:#fff;border-radius:11px;padding:11px 17px;font-weight:700;
  font-size:.84rem;display:inline-flex;align-items:center;gap:7px}
.btnOk{background:transparent;border:1px solid var(--borda);color:var(--mudo);border-radius:11px;padding:11px 15px;font-size:.84rem}
.btnOk:hover{border-color:var(--ok);color:var(--ok)}

/* ---------- Editor + Preview ---------- */
.editorWrap{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:1000px){.editorWrap{grid-template-columns:1fr}}
.secao{font-family:'Sora';font-size:.82rem;color:var(--ciano);font-weight:700;letter-spacing:.03em;
  margin:22px 0 4px;padding-top:14px;border-top:1px solid var(--borda);grid-column:1/-1}
.secao:first-child{border-top:0;padding-top:0;margin-top:6px}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:0 18px;padding:18px 22px 22px}
.grid2 .full{grid-column:1/-1}
.sufixo{display:flex;align-items:center}
.sufixo input{border-radius:11px 0 0 11px}
.sufixo span{background:var(--vidro2);border:1px solid var(--borda);border-left:0;border-radius:0 11px 11px 0;
  padding:10px 13px;font-size:.84rem;color:var(--mudo);white-space:nowrap}

.logoUp{border:2px dashed var(--borda);border-radius:14px;padding:18px;text-align:center;cursor:pointer;
  background:rgba(11,18,32,.5);transition:.18s}
.logoUp:hover{border-color:var(--azul);background:rgba(14,165,233,.06)}
.logoUp img{max-width:110px;max-height:110px;object-fit:contain;border-radius:12px;display:block;margin:0 auto}
.logoUp .ph{color:var(--fraco);font-size:.82rem}
.logoUp .ph .ico{font-size:1.8rem;display:block;margin-bottom:6px}

.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.presets button{width:40px;height:28px;border-radius:8px;border:2px solid transparent;padding:0}
.presets button:hover,.presets button.on{border-color:#fff}

.campos{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.campoLinha{display:flex;gap:8px;align-items:center;background:rgba(11,18,32,.6);border:1px solid var(--borda);
  border-radius:11px;padding:9px 11px}
.campoLinha input[type=text]{flex:1;padding:7px 10px;font-size:.83rem}
.campoLinha select{width:auto;padding:7px 9px;font-size:.8rem}
.campoLinha .obg{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--mudo);white-space:nowrap}
.campoLinha .obg input{width:16px;height:16px;accent-color:var(--azul)}
.campoLinha .del{background:transparent;border:0;color:var(--erro);font-size:1.05rem;padding:0 4px}

/* Preview */
.previewBox{position:sticky;top:24px}
.previewBox h3{font-size:.78rem;color:var(--mudo);margin-bottom:10px;text-align:center;font-weight:600}
.fone{width:100%;max-width:300px;margin:0 auto;background:#0a0f1e;border:7px solid #1e293b;border-radius:30px;
  padding:16px 12px 20px;box-shadow:0 18px 45px rgba(0,0,0,.5)}
.fone .notch{width:56px;height:5px;background:#1e293b;border-radius:99px;margin:0 auto 14px}
.pvCard{background:#101827;border:1px solid #1e293b;border-radius:17px;padding:20px 16px;text-align:center}
.pvCard img{width:66px;height:66px;object-fit:contain;border-radius:14px;margin:0 auto 10px;display:block}
.pvCard .tit{font-family:'Sora';font-size:.92rem;font-weight:700;margin-bottom:4px}
.pvCard .sub{color:var(--mudo);font-size:.7rem;margin-bottom:12px;line-height:1.45}
.pvCard .campo{background:#0b1220;border:1px solid #1e293b;border-radius:9px;padding:8px 10px;
  font-size:.68rem;color:var(--fraco);text-align:left;margin-bottom:7px}
.pvCard .campo b{color:var(--mudo);display:block;font-size:.6rem;font-weight:500;margin-bottom:2px}
.pvCard .optin{display:flex;gap:6px;text-align:left;font-size:.58rem;color:var(--fraco);line-height:1.4;margin:10px 0 4px}
.pvCard .optin i{width:12px;height:12px;border-radius:3px;background:var(--azul);flex:none;margin-top:1px;display:block}
.pvCard .btn{border-radius:9px;padding:10px;font-family:'Sora';font-weight:700;font-size:.76rem;color:#fff;margin-top:8px}
.pvCard .rod{font-size:.55rem;color:#475569;margin-top:11px}

.vazio{color:var(--mudo);text-align:center;padding:52px 12px;font-size:.9rem}
.vazio .emj{font-size:2rem;display:block;margin-bottom:10px}
.aba{display:none}.aba.ativa{display:block;animation:surge .25s ease}
@keyframes surge{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.aba.ativa{animation:none}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0d3a2e;color:#6ee7b7;
  border:1px solid #14532d;border-radius:12px;padding:12px 22px;font-size:.87rem;display:none;z-index:120;
  box-shadow:0 10px 30px rgba(0,0,0,.4)}
.toast.ruim{background:#3b0d0d;border-color:#7f1d1d;color:#fecaca}

/* Modal */
.modalBg{position:fixed;inset:0;background:rgba(4,8,16,.8);backdrop-filter:blur(4px);z-index:100;
  display:none;align-items:flex-start;justify-content:center;padding:26px 16px;overflow-y:auto}
.modalBg.on{display:flex}
.modal{background:#0d1524;border:1px solid var(--borda);border-radius:20px;max-width:1000px;width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal .cab{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--borda);position:sticky;top:0;
  background:#0d1524;border-radius:20px 20px 0 0;z-index:2}
.modal .cab h2{font-size:1.05rem}
.modal .cab .x{margin-left:auto;background:transparent;border:0;color:var(--mudo);font-size:1.4rem;line-height:1}
.modal .pe{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--borda);position:sticky;bottom:0;
  background:#0d1524;border-radius:0 0 20px 20px}
.modal .pe .btnP{margin:0;max-width:200px}

@media(max-width:760px){
  .shell{grid-template-columns:1fr}
  aside{position:fixed;bottom:0;top:auto;height:auto;width:100%;flex-direction:row;padding:8px 10px;
    border-right:0;border-top:1px solid var(--borda);z-index:20;overflow-x:auto}
  aside .marca,aside .rotulo,aside .rodape{display:none}
  .navItem{flex-direction:column;gap:4px;font-size:.62rem;padding:8px 10px;flex:1;justify-content:center;text-align:center}
  .navItem .pill{display:none}
  .conteudo{padding:18px 16px 90px}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="telaLogin">
  <div class="cardLogin">
    <svg class="hex" viewBox="0 0 64 64" fill="none">
      <path d="M32 4 56 18v28L32 60 8 46V18L32 4Z" stroke="url(#g1)" stroke-width="3" fill="#0b1220"/>
      <path d="M20 34c6.6-6.6 17.4-6.6 24 0" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
      <path d="M25 40c3.9-3.9 10.1-3.9 14 0" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="46" r="2.6" fill="#22d3ee"/>
      <defs><linearGradient id="g1" x1="8" y1="4" x2="56" y2="60"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs>
    </svg>
    <h1 class="marca">Conecta<span style="color:var(--azul)">Y</span></h1>
    <p class="sub">Painel de Wi-Fi Marketing</p>
    <label>E-mail</label><input id="loginEmail" type="email" autocomplete="username" placeholder="voce@email.com">
    <label>Senha</label><input id="loginSenha" type="password" autocomplete="current-password" placeholder="••••••••">
    <button class="btnP" onclick="entrar()">Entrar no painel</button>
    <div class="msgErro" id="loginErro"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
<div class="shell">
  <aside>
    <div class="marca">
      <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
        <path d="M32 4 56 18v28L32 60 8 46V18L32 4Z" stroke="#0ea5e9" stroke-width="4" fill="#0b1220"/>
        <path d="M20 34c6.6-6.6 17.4-6.6 24 0" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
        <circle cx="32" cy="43" r="3" fill="#22d3ee"/>
      </svg>
      Conecta<b>Y</b>
    </div>
    <div class="rotulo">Menu</div>
    <button class="navItem on" data-aba="dashboard" onclick="irAba('dashboard')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Dashboard</button>
    <button class="navItem" data-aba="leads" onclick="irAba('leads')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.4"/><path d="M2.8 20c.8-3.5 3.3-5.4 6.2-5.4s5.4 1.9 6.2 5.4"/><circle cx="17.2" cy="9.5" r="2.6"/><path d="M15.5 14.5c2.6.2 4.7 1.8 5.6 4.6"/></svg>Leads</button>
    <button class="navItem" data-aba="mensagens" onclick="irAba('mensagens')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.3 8.9 8.9 0 0 1-3.7-.8L3 20l1.1-5.4a8 8 0 0 1-.9-3.7A8.4 8.4 0 0 1 11.7 2.6 8.4 8.4 0 0 1 21 11.5Z"/></svg>
      Mensagens <span class="pill" id="pillMsgs" style="display:none">0</span></button>
    <button class="navItem" data-aba="aparencia" onclick="irAba('aparencia')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M4.2 4.2 6.3 6.3M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8 6.3 17.7M17.7 6.3l2.1-2.1"/></svg>Aparência</button>
    <button class="navItem" data-aba="lojas" id="navLojas" style="display:none" onclick="irAba('lojas')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5 4.6 4h14.8L21 9.5M3 9.5v10A1.5 1.5 0 0 0 4.5 21h15a1.5 1.5 0 0 0 1.5-1.5v-10M3 9.5c0 1.7 1.5 3 3.2 3s3-1.3 3-3c0 1.7 1.4 3 3 3s2.8-1.3 2.8-3c0 1.7 1.4 3 3 3s3-1.3 3-3M9 21v-6h6v6"/></svg>
      Lojas <span style="font-size:.62rem;color:var(--fraco)">admin</span></button>
    <div class="rodape">
      <div class="quem" id="quemNome">—</div>
      <div class="papel" id="quemPapel">—</div>
      <button class="btnSair" onclick="sair()">Sair</button>
    </div>
  </aside>

  <div class="conteudo">
    <div class="topo">
      <div><h1 id="tituloAba">Dashboard</h1><div class="data" id="dataHoje"></div></div>
      <div class="fim">
        <select id="seletorLoja" style="display:none" onchange="trocarLoja()"></select>
        <span id="nomeLojaFixo" style="color:var(--mudo);font-size:.86rem"></span>
      </div>
    </div>

    <section class="aba ativa" id="aba-dashboard">
      <div class="kpis" id="kpis"></div>
      <div class="graficos">

<script>
/* =========================================================
   CONFIG

const SUPABASE_URL = 'https://iekxuehdrxsimqtfejxm.supabase.co';
const SUPABASE_ANON_KEY = 'COLE_AQUI_SUA_ANON_KEY';
const EDGE_CRIAR_USUARIO = SUPABASE_URL + '/functions/v1/smart-responder';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let eu=null, lojas=[], lojaAtual=null, pessoas=[], disparos=[], catFiltro='';
let edit=null;           // loja em edição no modal
const charts={};
const titulos={dashboard:'Dashboard',leads:'Leads',mensagens:'Mensagens',aparencia:'Aparência',lojas:'Lojas'};
const PRESETS=[['#0ea5e9','#22d3ee'],['#ff6a1a','#8a3000'],['#70008f','#c026d3'],['#16a34a','#4ade80'],
               ['#e11d48','#fb7185'],['#f59e0b','#fbbf24'],['#1e293b','#475569'],['#7c3aed','#a78bfa']];
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
document.getElementById('dataHoje').textContent =

/* ---------------- Sessão ---------------- */
async function entrar(){
  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('loginEmail').value.trim(),
    password: document.getElementById('loginSenha').value });
  if (error){ const e=document.getElementById('loginErro');
    e.textContent = /Invalid API key/i.test(error.message) ? 'Chave do Supabase não configurada no painel.' : 'E-mail ou senha inválidos.';
    e.style.display='block'; return; }
  iniciar();
}
async function sair(){ await sb.auth.signOut(); location.reload(); }

async function iniciar(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) return;
  const { data:perfil } = await sb.from('portal_usuarios').select('*').eq('user_id', session.user.id).single();
  if (!perfil){ alert('Seu usuário ainda não foi liberado no painel.'); return sair(); }
  eu = perfil;
  telaLogin.style.display='none'; app.style.display='block';
  quemNome.textContent = session.user.email.split('@')[0];
  quemPapel.textContent = eu.papel==='admin' ? 'Administrador' : 'Cliente';

  const { data:ls } = await sb.from('portal_lojas').select('*').order('nome');
  lojas = ls || [];
  if (eu.papel==='admin'){
    navLojas.style.display='flex';
    seletorLoja.style.display='inline-block';
    seletorLoja.innerHTML = lojas.map(l=>`<option value="${l.id}">${esc(l.nome)}</option>`).join('');
    lojaAtual = lojas[0] || null;
    renderLojasAdmin();
  } else {
    lojaAtual = lojas.find(l=>String(l.id)===String(eu.loja_id)) || lojas[0] || null;
    nomeLojaFixo.textContent = lojaAtual ? lojaAtual.nome : '';
  }
  if (lojaAtual) await carregarTudo();
}
function trocarLoja(){
  lojaAtual = lojas.find(l=>String(l.id)===seletorLoja.value);
  carregarTudo();
}
async function carregarTudo(){
  await Promise.all([carregarDashboard(), carregarLeads(), carregarDisparos()]);
  montarAparencia();
}

/* ---------------- Dashboard ---------------- */
const ICO={
  hoje:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.9 4.9 7 7M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1 7 17M17 7l2.1-2.1"/></svg>',
  mes:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-5 4 3 6-7 3 3M3 21h18"/></svg>',
  unicos:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1-3.8 3.6-5.7 7-5.7s6 1.9 7 5.7"/></svg>',
  rec:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 11a8 8 0 1 0-2.3 6.3M20 5v6h-6"/></svg>',
  novos:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="8" r="3.4"/><path d="M3.5 20c.8-3.4 3.2-5.3 6.5-5.3M17 14v6M14 17h6"/></svg>',
  base:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5.5" rx="8" ry="3"/><path d="M4 5.5v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6M4 11.5v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>'};

async function carregarDashboard(){
  const { data, error } = await sb.rpc('portal_dashboard', { p_loja: lojaAtual.id });
  if (error){ console.error(error); return; }
  const d=data, cresc = d.mes_anterior>0 ? Math.round((d.mes_atual-d.mes_anterior)/d.mes_anterior*100) : null;
  kpis.innerHTML = [
    [ICO.hoje,'Visitas hoje',d.hoje],[ICO.mes,'Visitas no mês',d.mes_atual,cresc],
    [ICO.unicos,'Visitantes únicos',d.unicos],[ICO.rec,'Clientes recorrentes',d.recorrentes],
    [ICO.novos,'Novos cadastros (30d)',d.novos_30d],[ICO.base,'Base total (CRM)',d.total_leads]
  ].map(([ic,l,v,dl])=>`<div class="card kpi"><div class="ic">${ic}</div>
    <div class="v">${(v??0).toLocaleString('pt-BR')}</div><div class="l">${l}</div>
    ${dl!=null?`<span class="delta ${dl>=0?'up':'down'}">${dl>=0?'↑':'↓'} ${Math.abs(dl)}% vs mês anterior</span>`:''}</div>`).join('');

  const A='#0ea5e9', C='#22d3ee';
  desenhar('ch14','line',{labels:(d.ultimos_14d||[]).map(x=>x.dia.slice(8)+'/'+x.dia.slice(5,7)),
    datasets:[{data:(d.ultimos_14d||[]).map(x=>x.n),borderColor:A,borderWidth:2.5,backgroundColor:gradArea(),
      fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointBackgroundColor:C}]});
  const hs=Array.from({length:24},(_,h)=>({h,n:0})); (d.por_hora||[]).forEach(x=>hs[x.h].n=x.n);
  const mh=Math.max(...hs.map(x=>x.n));
  desenhar('chHora','bar',{labels:hs.map(x=>x.h+'h'),
    datasets:[{data:hs.map(x=>x.n),backgroundColor:hs.map(x=>x.n===mh&&x.n>0?C:'rgba(14,165,233,.45)'),borderRadius:5}]});
  const nd=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'], ds=Array.from({length:7},(_,i)=>({d:i+1,n:0}));
  (d.por_dia_semana||[]).forEach(x=>ds[x.d-1].n=x.n);
  const md=Math.max(...ds.map(x=>x.n));
  desenhar('chDia','bar',{labels:nd,
    datasets:[{data:ds.map(x=>x.n),backgroundColor:ds.map(x=>x.n===md&&x.n>0?C:'rgba(14,165,233,.45)'),borderRadius:5}]});
  desenhar('chDisp','doughnut',{labels:(d.dispositivos||[]).map(x=>x.k),
    datasets:[{data:(d.dispositivos||[]).map(x=>x.n),backgroundColor:[A,C,'#818cf8','#64748b'],borderWidth:0,hoverOffset:6}]});
  desenhar('chSO','doughnut',{labels:(d.sistemas||[]).map(x=>x.k),
    datasets:[{data:(d.sistemas||[]).map(x=>x.n),backgroundColor:[C,A,'#a78bfa','#f472b6','#64748b'],borderWidth:0,hoverOffset:6}]});
  desenhar('chCat','doughnut',{labels:(d.categorias||[]).map(x=>x.k),
    datasets:[{data:(d.categorias||[]).map(x=>x.n),backgroundColor:['#7dd3fc','#6ee7b7','#fcd34d','#fda4af'],borderWidth:0,hoverOffset:6}]});
}
function gradArea(){ const c=ch14.getContext('2d'), g=c.createLinearGradient(0,0,0,220);
  g.addColorStop(0,'rgba(14,165,233,.28)'); g.addColorStop(1,'rgba(14,165,233,0)'); return g; }
function desenhar(id,tipo,dados){
  if (charts[id]) charts[id].destroy();
  const o={maintainAspectRatio:true,plugins:{legend:{display:tipo==='doughnut',position:'bottom',
      labels:{color:'#8b9bb4',boxWidth:10,padding:14,font:{size:11}}},
    tooltip:{backgroundColor:'#0d1524',borderColor:'#1e293b',borderWidth:1,titleColor:'#e2e8f0',bodyColor:'#8b9bb4',cornerRadius:9,padding:10}},
    scales:tipo==='doughnut'?{}:{x:{ticks:{color:'#5b6b84',font:{size:10}},grid:{display:false}},
      y:{ticks:{color:'#5b6b84',font:{size:10}},grid:{color:'rgba(30,41,59,.5)'},beginAtZero:true,border:{display:false}}}};
  if (tipo==='doughnut') o.cutout='68%';
  charts[id]=new Chart(document.getElementById(id),{type:tipo,data:dados,options:o});
}

/* ---------------- Leads ---------------- */
async function carregarLeads(){
  const { data } = await sb.from('portal_pessoas').select('*')
    .eq('loja_id', lojaAtual.id).order('ultima_visita',{ascending:false}).limit(2000);
  pessoas = data || []; renderLeads();
}
function renderLeads(){
  const q=(fBusca.value||'').toLowerCase(), cat=fCat.value, st=fStatus.value;
  const lista=pessoas.filter(p=>(!q||(p.nome||'').toLowerCase().includes(q)||(p.telefone||'').includes(q))
    &&(!cat||p.categoria===cat)&&(!st||p.status===st));
  if(!lista.length){ tabelaLeads.innerHTML='<div class="card vazio"><span class="emj">🔍</span>Nenhum lead encontrado.</div>'; return; }
  tabelaLeads.innerHTML=`<div class="tWrap"><table><thead><tr><th>Nome</th><th>WhatsApp</th><th>Visitas</th>
    <th>Última</th><th>Categoria</th><th>Status</th><th>Tags</th><th></th></tr></thead><tbody>
    ${lista.map(p=>`<tr><td><b>${esc(p.nome)||'—'}</b>${(p.aniversario)?' 🎂':''}</td>
    <td><a href="https://wa.me/55${p.telefone}" target="_blank">${fmtTel(p.telefone)}</a></td>
    <td>${p.total_visitas}</td><td>${p.ultima_visita?fmtData(p.ultima_visita):'—'}</td>
    <td><span class="badge b-${p.categoria}">${p.categoria}</span></td>
    <td><span class="badge b-${p.status||'ativo'}">${p.status||'ativo'}</span></td>
    <td>${(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')||'—'}</td>
    <td><button class="btnG" style="padding:6px 10px" onclick="editarPessoa(${p.id})">✏️</button></td></tr>`).join('')}
    </tbody></table></div>`;
}
const fmtTel=t=>t&&t.length>=10?`(${t.slice(0,2)}) ${t.slice(2,-4)}-${t.slice(-4)}`:t;
const fmtData=d=>{const[a,m,x]=d.split('-');return `${x}/${m}/${a.slice(2)}`};

async function editarPessoa(id){
  const p=pessoas.find(x=>x.id===id); if(!p) return;
  const tags=prompt('Tags separadas por vírgula:',(p.tags||[]).join(', ')); if(tags===null) return;
  const obs=prompt('Observações:',p.observacoes||''); if(obs===null) return;
  const st=prompt('Status (ativo / vip / bloqueado):',p.status||'ativo'); if(st===null) return;
  const novo={tags:tags.split(',').map(t=>t.trim()).filter(Boolean),observacoes:obs,
    status:['ativo','vip','bloqueado'].includes(st.trim())?st.trim():'ativo'};
  const {error}=await sb.from('portal_pessoas').update(novo).eq('id',id);
  if(error) return toast('Erro: '+error.message,true);
  Object.assign(p,novo); renderLeads(); toast('Lead atualizado');
}
function baixar(nome,txt,tipo){ const b=new Blob(['\ufeff'+txt],{type:(tipo||'text/csv')+';charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=nome; a.click(); }

// devolve a lista JÁ FILTRADA pela tela (busca, categoria, status)
function pessoasFiltradas(){
  const q=(fBusca.value||'').toLowerCase(), cat=fCat.value, st=fStatus.value;
  return pessoas.filter(p=>(!q||(p.nome||'').toLowerCase().includes(q)||(p.telefone||'').includes(q))
    &&(!cat||p.categoria===cat)&&(!st||p.status===st));
}
function sufixoArquivo(){
  const p=[lojaAtual.slug];
  if(fCat.value) p.push(fCat.value);
  if(fStatus.value) p.push(fStatus.value);
  return p.join('_')+'_'+new Date().toISOString().slice(0,10);
}
function exportarCSV(){
  const lista=pessoasFiltradas();
  if(!lista.length) return toast('Nenhum lead nos filtros atuais',true);
  const L=[['nome','telefone','aniversario','primeira_visita','ultima_visita','visitas','categoria','status','tags','obs']];
  lista.forEach(p=>L.push([p.nome||'',p.telefone,p.aniversario||'',p.primeira_visita||'',p.ultima_visita||'',
    p.total_visitas,p.categoria,p.status||'ativo',(p.tags||[]).join('|'),(p.observacoes||'').replace(/\n/g,' ')]));
  baixar(`leads_${sufixoArquivo()}.csv`, L.map(l=>l.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n'));
  toast(`CSV exportado (${lista.length} leads)`);
}
function exportarFbAds(){
  const lista=pessoasFiltradas().filter(p=>p.status!=='bloqueado');
  if(!lista.length) return toast('Nenhum lead nos filtros atuais',true);
  const L=[['phone','fn']];
  lista.forEach(p=>L.push([`+55${p.telefone}`,(p.nome||'').split(' ')[0].toLowerCase()]));
  baixar(`meta_ads_${sufixoArquivo()}.csv`, L.map(l=>l.join(',')).join('\n'));
  toast(`Audiência com ${lista.length} contatos — suba em Públicos personalizados`);
}
function exportarVcf(){
  const lista=pessoasFiltradas().filter(p=>p.telefone && p.status!=='bloqueado');
  if(!lista.length) return toast('Nenhum lead nos filtros atuais',true);
  const marca=(lojaAtual.nome||'').slice(0,18);
  const vcf=lista.map(p=>{
    const nome=((p.nome||'Cliente').replace(/[\r\n;]/g,' ').trim())+' · '+marca;
    const l=['BEGIN:VCARD','VERSION:3.0',`N:;${nome};;;`,`FN:${nome}`,
             `TEL;TYPE=CELL:+55${p.telefone}`,`NOTE:${p.categoria} · ${p.total_visitas} visita(s) · ConectaY`];
    if(p.aniversario && /^\d{4}-\d{2}-\d{2}$/.test(p.aniversario)) l.push(`BDAY:${p.aniversario}`);
    l.push('END:VCARD');
    return l.join('\r\n');
  }).join('\r\n');
  baixar(`agenda_${sufixoArquivo()}.vcf`, vcf, 'text/vcard');
  toast(`${lista.length} contatos no .vcf — abra o arquivo no celular pra importar`);
}

/* ---------------- Mensagens ---------------- */
async function carregarDisparos(){
  const { data } = await sb.from('portal_disparos_prontos').select('*')
    .eq('loja_id', lojaAtual.id).order('criado_em',{ascending:false}).limit(500);
  disparos = data || [];
  pillMsgs.textContent=disparos.length; pillMsgs.style.display=disparos.length?'inline-block':'none';
  renderDisparos();
}
function renderDisparos(){
  const cs=['','aniversario','saudade','inativo','recorrente','novo'];
  const rot={'':'Todas','aniversario':'🎂 Aniversário','saudade':'🥺 Saudade','inativo':'😴 Inativo','recorrente':'🤝 Recorrente','novo':'✨ Novo'};
  catsMsg.innerHTML=cs.map(c=>{const n=c?disparos.filter(d=>d.categoria===c).length:disparos.length;
    return `<button class="${catFiltro===c?'on':''}" onclick="catFiltro='${c}';renderDisparos()">${rot[c]} · ${n}</button>`}).join('');
  const lista=catFiltro?disparos.filter(d=>d.categoria===catFiltro):disparos;
  if(!lista.length){ listaDisparos.innerHTML='<div class="card vazio"><span class="emj">🎉</span>Nenhuma mensagem pendente.<br><small style="color:var(--fraco)">Geradas automaticamente todo dia às 7h.</small></div>'; return; }
  listaDisparos.innerHTML=lista.map(d=>`<div class="card disparo">
    <div class="avatar">${(d.nome||'C').trim()[0].toUpperCase()}</div>
    <div class="info"><b>${esc(d.nome)||'Cliente'}</b>
      <span style="color:var(--fraco);font-size:.82rem"> · ${fmtTel(d.telefone)} · ${d.total_visitas||0} visita(s)</span>
      <span class="badge b-${d.categoria}" style="margin-left:6px">${d.categoria}</span>
      <div class="msg">${esc(d.mensagem)}</div></div>
    <a class="btnZap" target="_blank" href="https://wa.me/55${d.telefone}?text=${encodeURIComponent(d.mensagem)}"
       onclick="setTimeout(()=>marcarEnviado(${d.id}),400)">Abrir WhatsApp</a>
    <button class="btnOk" onclick="marcarEnviado(${d.id})">✓ Enviado</button></div>`).join('');
}
async function marcarEnviado(id){
  const {error}=await sb.from('portal_disparos').update({status:'enviado',enviado_em:new Date().toISOString()}).eq('id',id);
  if(error) return toast('Erro: '+error.message,true);
  disparos=disparos.filter(d=>d.id!==id);
  pillMsgs.textContent=disparos.length; pillMsgs.style.display=disparos.length?'inline-block':'none';
  renderDisparos(); toast('Marcado como enviado ✓');
}

/* =========================================================
   CAMPOS DO FORMULÁRIO (aceita os 2 formatos do banco)
========================================================= */
function lerCampos(fc){
  const padrao=[{campo:'nome',label:'Seu nome',obrigatorio:false},
                {campo:'telefone',label:'WhatsApp',obrigatorio:true},
                {campo:'aniversario',label:'Data de aniversário',obrigatorio:false}];
  if(!fc) return padrao;
  if(Array.isArray(fc)){ const l=fc.map(c=>({campo:c.campo||c.nome||c.key,
      label:c.label||c.rotulo||c.campo, obrigatorio:!!(c.obrigatorio??c.obrig??c.req)})).filter(c=>c.campo);
    return l.length?l:padrao; }
  if(typeof fc==='object'){ const l=Object.entries(fc).map(([k,v])=>({campo:k,
      label:(v&&(v.label||v.rotulo))||k.charAt(0).toUpperCase()+k.slice(1),
      obrigatorio:!!(v&&(v.obrig??v.obrigatorio??v.req))}));
    return l.length?l:padrao; }
  return padrao;
}

/* =========================================================

function preview(l){

  const logo=l.logo_url?`<img src="${esc(l.logo_url)}" alt="">`:'';
  const rot = t==='whatsapp'?'Entrar no grupo do WhatsApp'
            : t==='google_review'?'Avalie a gente no Google ⭐'
            : t==='formulario'?(l.botao_txt||'Conectar ao Wi-Fi')
            : `Seguir @${(l.instagram||'sualoja').replace('@','')}`;
  const sub = t==='formulario'?'Preencha rapidinho e conecte-se em segundos.'
            : t==='whatsapp'?'Entre no nosso grupo e navegue à vontade.'
            : t==='google_review'?'Deixe sua avaliação e navegue à vontade.'
            : 'Siga a gente no Instagram e navegue à vontade.';
  const campos = t==='formulario' ? lerCampos(l.form_campos).map(c=>
     `<div class="campo"><b>${esc(c.label)}${c.obrigatorio?' *':''}</b>${
        c.campo==='telefone'?'(21) 99999-9999':c.campo==='aniversario'?'dd/mm/aaaa':'...'}</div>`).join('') : '';
  const optin = t==='formulario' ? `<div class="optin"><i></i><span>Aceito receber novidades da ${esc(l.nome||'loja')} no WhatsApp e a Política de Privacidade.</span></div>` : '';
  return `<div class="pvCard">${logo}
    <div class="tit">${esc(l.form_titulo|| 'Wi-Fi grátis · '+(l.nome||'Sua Loja'))}</div>
    <div class="sub">${sub}</div>${campos}${optin}

    ${l.vcard_ativo?'<div class="btn" style="background:#0b1220;border:1px solid #1e293b;color:#e2e8f0;margin-top:6px">📇 Salvar nosso contato</div>':''}
    <div class="rod">Powered by ConectaY</div></div>`;
}

/* =========================================================
   UPLOAD DE LOGO (comprime e guarda em logo_url)
========================================================= */
function escolherLogo(destinoInputId, previewFn){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
    if(f.size>4*1024*1024) return toast('Imagem muito grande (máx 4 MB)',true);
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image();
      img.onload=()=>{ const M=320, r=Math.min(M/img.width,M/img.height,1);
        const cv=document.createElement('canvas'); cv.width=img.width*r; cv.height=img.height*r;
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        const b64=cv.toDataURL('image/png');
        document.getElementById(destinoInputId).value=b64;
        previewFn(); toast('Logo carregada — lembre de salvar');
      };
      img.onerror=()=>toast('Não consegui ler essa imagem',true);
      img.src=fr.result; };
    fr.readAsDataURL(f); };
  inp.click();
}

function linhaCampo(pref,c,i){
  const tipos=['nome','telefone','aniversario','email','cpf','endereco'];

  const box=document.getElementById(pref+'_campos');
  box.insertAdjacentHTML('beforeend', linhaCampo(pref,{campo:'email',label:'E-mail',obrigatorio:false},box.children.length));

function colherCampos(pref){

  let dominio=lj_dominio.value.trim().toLowerCase();
  if(dominio && !dominio.includes('.')) dominio+='.conectay.com.br';
  if(f.destino_tipo==='whatsapp' && !f.whatsapp_link.trim()) return toast('Informe o link do grupo',true);
  if(f.vcard_ativo && (f.vcard_telefone||'').length<10) return toast('Informe o WhatsApp da loja com DDD pro cartão de contato',true);
  if(f.destino_tipo==='google_review' && !f.google_review_url.trim()) return toast('Informe o link de avaliação',true);

  const emailAcesso=lj_emailAcesso.value.trim(), senhaAcesso=lj_senhaAcesso.value.trim();
  if(!edit.id && emailAcesso && !senhaAcesso) return toast('Informe a senha inicial do cliente',true);
  if(senhaAcesso && senhaAcesso.length<6) return toast('A senha precisa ter ao menos 6 caracteres',true);

  const dados={ nome, slug, dominio:dominio||null,
    responsavel:lj_responsavel.value.trim()||null, contato:lj_contato.value.trim()||null,
    documento:lj_documento.value.trim()||null, email_cliente:lj_email.value.trim()||null,
    endereco:lj_endereco.value.trim()||null, email_acesso:emailAcesso||null,
    destino_tipo:f.destino_tipo, instagram:f.instagram.trim()||null,
    whatsapp_link:f.whatsapp_link.trim()||null, google_review_url:f.google_review_url.trim()||null,
    form_titulo:f.form_titulo.trim()||null, botao_txt:f.botao_txt.trim()||null,
    form_campos:f.destino_tipo==='formulario'?f.form_campos:(edit.form_campos||null),
    logo_url:f.logo_url||null, cor:f.cor, cor2:f.cor2,
    vcard_ativo:f.vcard_ativo, vcard_telefone:f.vcard_telefone||null, vcard_nome:f.vcard_nome.trim()||null,
    codigo_wifi:lj_codigo.value.trim()||null, ap_secret:lj_secret.value.trim()||null,
    valor_mensal:lj_valor.value?Number(lj_valor.value):null,
    dia_vencimento:lj_diavenc.value?Number(lj_diavenc.value):null,
    plano:lj_plano.value.trim()||null, status_pagamento:lj_statusPg.value||null,
    obs:lj_obs.value.trim()||null };

  statusLoja.textContent='Salvando...';
  let lojaId=edit.id, erro=null;
  if(edit.id){
    const {error}=await sb.from('portal_lojas').update(dados).eq('id',edit.id); erro=error;
  } else {
    dados.ativo=true;
    const {data,error}=await sb.from('portal_lojas').insert(dados).select().single();
    erro=error; if(data) lojaId=data.id;
  }
  if(erro){ statusLoja.textContent=''; return toast('Erro: '+erro.message,true); }

  // cria/atualiza o login do cliente via RPC própria (SECURITY DEFINER)
  if(emailAcesso && senhaAcesso){
    statusLoja.textContent='Criando login do cliente...';
    const { data:res, error:errRpc } = await sb.rpc('conectay_criar_usuario',
      { p_email: emailAcesso, p_senha: senhaAcesso, p_loja_id: lojaId });
    if(errRpc){
      toast('Loja salva, mas o login NÃO foi criado: '+errRpc.message+
            ' — recarregue a página com Ctrl+Shift+R e tente de novo.', true);
    } else if(res && res.ok === false){
      toast('Loja salva, mas o login falhou: '+res.erro, true);
    } else {
      toast('Loja salva e login do cliente criado ✓');
    }
  } else {
    toast('Loja salva ✓');
  }

  statusLoja.textContent='';
  const {data:ls}=await sb.from('portal_lojas').select('*').order('nome');
  lojas=ls||[]; renderLojasAdmin();
  seletorLoja.innerHTML=lojas.map(l=>`<option value="${l.id}">${esc(l.nome)}</option>`).join('');
  if(lojaAtual){ const at=lojas.find(l=>l.id===lojaAtual.id); if(at){ lojaAtual=at; montarAparencia(); } }
  fecharEditor();
}

/* ---------------- Util ---------------- */
function irAba(nome){
  document.querySelectorAll('.navItem').forEach(b=>b.classList.toggle('on',b.dataset.aba===nome));
  document.querySelectorAll('.aba').forEach(a=>a.classList.toggle('ativa',a.id==='aba-'+nome));
  tituloAba.textContent = titulos[nome]||nome;
}
function toast(t,ruim){ const el=document.getElementById('toast'); el.textContent=t;
  el.className='toast'+(ruim?' ruim':''); el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',3000); }
loginSenha.addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
modalBg.addEventListener('click',e=>{ if(e.target===modalBg) fecharEditor(); });

iniciar();
</script>
</body>
</html>
