<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel de Portais Wi-Fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d13;--surface:#151823;--surface-2:#1c2030;--border:#282d3f;--border-2:#39405a;
  --text:#eef1f8;--text-dim:#98a0b6;--text-faint:#5f6780;
  --accent:#6366f1;--accent-2:#818cf8;--accent-3:#22d3ee;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;
  --grad:linear-gradient(135deg,#6366f1,#22d3ee);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;width:100%;padding:10px 12px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
label.fld{display:block;margin-bottom:12px}
label.fld span{display:block;font-size:12px;color:var(--text-dim);font-weight:600;margin-bottom:5px}
label.fld small{color:var(--text-faint);font-weight:400}
.btn{border:0;border-radius:9px;padding:11px 18px;font-weight:700;font-size:13px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);transition:.15s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-2)}
.btn.danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{padding:7px 12px;font-size:12px}
.btn.ghost{background:transparent}

/* login */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:34px 28px}
.login-card h1{font-size:20px;font-weight:900;margin-bottom:4px}
.login-card p{color:var(--text-dim);font-size:13px;margin-bottom:22px}
.login-card .btn{width:100%;margin-top:8px;justify-content:center}
.err{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px}

/* app */
#app{max-width:1100px;margin:0 auto;padding:22px 18px 60px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.top h1{font-size:19px;font-weight:900}
.top .sub{color:var(--text-faint);font-size:12.5px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.kpi .l{font-size:11.5px;color:var(--text-dim);font-weight:600;margin-bottom:6px}
.kpi .v{font-size:26px;font-weight:900;letter-spacing:-.5px}
.kpi .s{font-size:11px;color:var(--text-faint);margin-top:3px}

.lojas{display:flex;flex-direction:column;gap:12px}
.loja{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.loja.off{opacity:.55}
.loja .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.loja .info{flex:1;min-width:180px}
.loja .nome{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
.loja .meta{font-size:12px;color:var(--text-dim);margin-top:3px}
.loja .meta a{color:var(--accent-2);text-decoration:none}
.loja .nums{text-align:right;font-size:12px;color:var(--text-dim)}
.loja .nums b{color:var(--text);font-size:17px;display:block}
.loja .acts{display:flex;gap:7px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px}
.badge.on{background:rgba(34,197,94,.15);color:#4ade80}
.badge.off{background:rgba(239,68,68,.15);color:#f87171}
.badge.venc{background:rgba(245,158,11,.15);color:#fbbf24}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px}
.modal h2{font-size:17px;font-weight:900;margin-bottom:4px}
.modal .hint{color:var(--text-dim);font-size:12.5px;margin-bottom:18px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.vazio{text-align:center;padding:60px 20px;color:var(--text-dim)}
.vazio .big{font-size:40px;margin-bottom:12px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.4)}
@media(max-width:560px){.row2{grid-template-columns:1fr}.loja .nums{text-align:left}}

/* marca ConectaY */
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:38px;height:38px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 6px 18px rgba(99,102,241,.35)}
.brand-name{font-size:23px;font-weight:900;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand-name span{-webkit-text-fill-color:var(--accent-3)}
.login-card .btn.primary{background:var(--grad);border:0}
.top .btn.primary{background:var(--grad);border:0}
.kpi{position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);opacity:.7}
.kpi.hero .v{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* mini gráfico de barras (sparkline) */
.spark{display:flex;align-items:flex-end;gap:3px;height:44px;margin-top:10px}
.spark .bar{flex:1;background:var(--grad);border-radius:3px 3px 0 0;min-height:3px;opacity:.85;transition:.2s}
.spark .bar:hover{opacity:1}
.spark-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:24px}
.spark-wrap h3{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:2px}
.spark-lbls{display:flex;justify-content:space-between;font-size:10px;color:var(--text-faint);margin-top:6px}

/* loja clicável */
.loja{cursor:default}
.loja .info{cursor:pointer}
.loja .trend{font-size:11px;font-weight:700;margin-top:2px}
.trend.up{color:var(--success)}.trend.down{color:var(--danger)}.trend.flat{color:var(--text-faint)}.trend.warn{color:var(--warn)}

/* detalhe da loja (modal grande) */
.det h2{font-size:20px;margin-bottom:2px}
.det .dom{color:var(--text-dim);font-size:12.5px;margin-bottom:18px}
.det-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.det-kpi{background:var(--surface-2);border-radius:12px;padding:13px}
.det-kpi .l{font-size:10.5px;color:var(--text-dim);font-weight:600}
.det-kpi .v{font-size:22px;font-weight:900;margin-top:3px}
.det-share{background:var(--surface-2);border:1px dashed var(--border-2);border-radius:12px;padding:14px;font-size:12.5px;color:var(--text-dim);margin-top:6px}


/* upload de logo */
.logo-up{border:2px dashed var(--border-2);border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:6px;background:var(--surface-2)}
.logo-up:hover{border-color:var(--accent)}
.logo-up img{max-height:70px;max-width:100%;border-radius:8px}
.lu-ico{font-size:30px;margin-bottom:6px}
.logo-up small{color:var(--text-faint);display:block;margin-top:3px}
/* paleta */
.paleta{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.pcor{display:flex;flex-direction:column;align-items:center;gap:5px}
.pcor input[type=color]{width:52px;height:52px;border-radius:50%;border:3px solid var(--border-2);padding:0;cursor:pointer;background:none}
.pcor span{font-size:10.5px;color:var(--text-dim);font-weight:600}
.pgrad{flex:1;min-width:120px;height:52px;border-radius:12px;border:1px solid var(--border)}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.secao{font-size:13px;font-weight:800;color:var(--accent-2);margin:20px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.secao:first-child{margin-top:0}
.fb-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:7px;background:var(--surface-2)}
.fb-row.on{border-color:var(--accent)}
.fb-check{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer}
.fb-obrig{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--warn);cursor:pointer}
.form-hint{font-size:11.5px;color:var(--text-faint);margin-top:4px}
.secao small{color:var(--text-faint);font-weight:400}
.preset{width:34px;height:26px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:.12s}
.preset:hover{transform:scale(1.1);border-color:#fff}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="brand"><span class="brand-mark">📶</span><h1 class="brand-name">Conecta<span>Y</span></h1></div>
    <p>O Wi-Fi que trabalha pra sua loja. Entre pra gerenciar.</p>
    <label class="fld"><span>E-mail</span><input id="email" type="email" autocomplete="username"></label>
    <label class="fld"><span>Senha</span><input id="senha" type="password" autocomplete="current-password"></label>
    <button class="btn primary" onclick="entrar()">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="top">
    <div class="brand"><span class="brand-mark">📶</span><div><h1 class="brand-name" style="font-size:20px">Conecta<span>Y</span></h1><div class="sub" id="userInfo"></div></div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn primary" onclick="abrirNova()">➕ Nova loja</button>
      <a class="btn ghost sm" href="tutorial-ap.html" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center">📖 Tutorial do AP</a>
      <button class="btn ghost sm" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>
  <div class="spark-wrap" id="grafico" style="display:none"></div>
  <div class="lojas" id="lojas"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://iekxuehdrxsimqtfejxm.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlla3h1ZWhkcnhzaW1xdGZlanhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDk0NzAsImV4cCI6MjA5MTA4NTQ3MH0.61zaRoTBK2XorXgAcGXcsN8yOY0MTRS4bIJ_X4vPjyA';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let LOJAS=[];

function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function entrar(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('senha').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){err.textContent='E-mail ou senha inválidos.';return}
  mostrarApp(data.user);
}
async function sair(){await sb.auth.signOut();location.reload();}

function mostrarApp(user){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').textContent=user.email;
  carregar();
}

let ACESSOS=[];
async function carregar(){
  const {data,error}=await sb.from('portal_lojas').select('*').order('criado_em',{ascending:false});  // inclui edit_token
  if(error){toast('Erro: '+error.message);return}
  LOJAS=data||[];
  const ini=new Date(Date.now()-30*864e5).toISOString();
  const {data:ac}=await sb.from('portal_acessos').select('loja_id,criado_em').gte('criado_em',ini);
  ACESSOS=ac||[];
  const cont={},cont7={},contPrev7={};
  const lim7=Date.now()-7*864e5, lim14=Date.now()-14*864e5;
  ACESSOS.forEach(a=>{
    const t=new Date(a.criado_em).getTime();
    cont[a.loja_id]=(cont[a.loja_id]||0)+1;
    if(t>lim7)cont7[a.loja_id]=(cont7[a.loja_id]||0)+1;
    else if(t>lim14)contPrev7[a.loja_id]=(contPrev7[a.loja_id]||0)+1;
  });
  window.__cont=cont;window.__cont7=cont7;
  renderGrafico();
  render(cont,cont7,contPrev7);
}

// gráfico geral: acessos por dia (14 dias)
function renderGrafico(){
  const dias=14, hoje=new Date(); hoje.setHours(0,0,0,0);
  const buckets=Array(dias).fill(0);
  ACESSOS.forEach(a=>{
    const d=new Date(a.criado_em); d.setHours(0,0,0,0);
    const idx=dias-1-Math.round((hoje-d)/864e5);
    if(idx>=0&&idx<dias)buckets[idx]++;
  });
  const max=Math.max(1,...buckets);
  const el=document.getElementById('grafico'); if(!el)return;
  const total=buckets.reduce((a,b)=>a+b,0);
  if(total===0){ el.style.display='none'; return; }
  el.style.display='block';
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const d0=new Date(hoje-13*864e5);
  el.innerHTML='<h3>Conexões por dia — últimas 2 semanas</h3>'
    +'<div class="spark">'+buckets.map((v,i)=>`<div class="bar" style="height:${Math.max(3,v/max*100)}%" title="${v} conexões"></div>`).join('')+'</div>'
    +`<div class="spark-lbls"><span>${fmt(d0)}</span><span><b style="color:var(--text)">${total.toLocaleString('pt-BR')}</b> no total</span><span>${fmt(hoje)}</span></div>`;
}

function render(cont,cont7,contPrev7){
  cont=cont||{};cont7=cont7||{};contPrev7=contPrev7||{};
  const ativas=LOJAS.filter(l=>l.ativo).length;
  const totalAcessos=Object.values(cont).reduce((a,b)=>a+b,0);
  const total7=Object.values(cont7).reduce((a,b)=>a+b,0);
  const mrr=LOJAS.filter(l=>l.ativo&&l.valor_mensal).reduce((s,l)=>s+Number(l.valor_mensal),0);
  const faturamento='R$ '+mrr.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const atrasados=LOJAS.filter(l=>statusCobranca(l).vencido&&l.ativo).length;
  const totalAtrasado=LOJAS.filter(l=>statusCobranca(l).vencido&&l.ativo).reduce((s,l)=>s+Number(l.valor_mensal||0),0);
  const aReceber='R$ '+totalAtrasado.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const hoje=new Date().toISOString().slice(0,10);
  const vencendo=LOJAS.filter(l=>l.vencimento&&l.vencimento<=hoje&&l.ativo).length;

  document.getElementById('kpis').innerHTML=[
    ['hero','Faturamento mensal',faturamento,'de '+ativas+' lojas ativas'],
    ['','Conexões (30 dias)',totalAcessos.toLocaleString('pt-BR'),total7.toLocaleString('pt-BR')+' nos últimos 7'],
    ['','A receber',aReceber,atrasados?'⚠️ '+atrasados+' atrasada(s)':'tudo em dia ✅'],
  ].map(k=>`<div class="kpi ${k[0]}"><div class="l">${k[1]}</div><div class="v">${k[2]}</div><div class="s">${k[3]}</div></div>`).join('');

  const box=document.getElementById('lojas');
  if(!LOJAS.length){
    box.innerHTML='<div class="vazio"><div class="big">📶</div><h3>Nenhuma loja ainda</h3><p>Clique em "➕ Nova loja" pra cadastrar seu primeiro cliente.</p></div>';
    return;
  }
  box.innerHTML=LOJAS.map(l=>{
    const venc=l.vencimento&&l.vencimento<=hoje;
    return `<div class="loja ${l.ativo?'':'off'}">
      <div class="dot" style="background:${esc(l.cor||'#3b82f6')}"></div>
      <div class="info" onclick="abrirDetalhe(${l.id})">
        <div class="nome">${esc(l.nome)}
          <span class="badge ${l.ativo?'on':'off'}">${l.ativo?'ativa':'desligada'}</span>
          ${venc?'<span class="badge venc">vencida</span>':''}
          ${l.destino_tipo==='whatsapp'?'<span class="badge" style="background:rgba(34,197,94,.15);color:#4ade80">💬 grupo</span>':'<span class="badge" style="background:rgba(129,140,248,.15);color:var(--accent-2)">📸 insta</span>'}
        </div>
        <div class="meta">
          ${l.dominio?`🌐 ${esc(l.dominio)}`:'<span style="color:var(--warn)">⚠️ sem domínio</span>'}
          ${l.valor_mensal?` · 💰 R$ ${Number(l.valor_mensal).toLocaleString('pt-BR',{minimumFractionDigits:2})}/mês`:''}
        </div>
        ${(()=>{const sc=statusCobranca(l);return sc.txt!=='sem cobrança'?`<div class="trend ${sc.cls}">${sc.txt}</div>`:tendencia(cont7[l.id]||0,contPrev7[l.id]||0);})()}
      </div>
      <div class="nums"><b>${(cont[l.id]||0).toLocaleString('pt-BR')}</b>conexões 30d<br><small>${cont7[l.id]||0} nos últimos 7</small></div>
      <div class="acts">
        ${(()=>{const sc=statusCobranca(l);return (l.valor_mensal&&sc.txt!=='pago este mês')?`<button class="btn sm primary" onclick="registrarPagamento(${l.id})" title="marcar mensalidade como paga">✅ Recebi</button>`:'';})()}
        <button class="btn sm" onclick="editar(${l.id})">✏️ Editar</button>
        <button class="btn sm ${l.ativo?'danger':'primary'}" onclick="toggleAtiva(${l.id},${!l.ativo})">${l.ativo?'Desligar':'Ligar'}</button>
      </div>
    </div>`;
  }).join('');
}

// calcula situação de cobrança da loja
function statusCobranca(l){
  if(!l.dia_vencimento||!l.valor_mensal) return {txt:'sem cobrança',cls:'flat',vencido:false};
  const hoje=new Date(); const diaHoje=hoje.getDate();
  const ref=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
  const pagouEsseMes=l.ultimo_pagamento&&l.ultimo_pagamento.slice(0,7)===ref;
  if(pagouEsseMes) return {txt:'pago este mês',cls:'up',vencido:false};
  // ainda não pagou este mês
  if(diaHoje>l.dia_vencimento) return {txt:'⚠️ atrasado',cls:'down',vencido:true};
  const faltam=l.dia_vencimento-diaHoje;
  if(faltam<=3) return {txt:'vence em '+faltam+'d',cls:'warn',vencido:false};
  return {txt:'vence dia '+l.dia_vencimento,cls:'flat',vencido:false};
}
function tendencia(atual,anterior){
  if(atual===0&&anterior===0)return '<div class="trend flat">— sem conexões ainda</div>';
  if(anterior===0)return '<div class="trend up">▲ começou a receber conexões</div>';
  const pct=Math.round((atual-anterior)/anterior*100);
  if(pct>5)return `<div class="trend up">▲ ${pct}% vs semana anterior</div>`;
  if(pct<-5)return `<div class="trend down">▼ ${Math.abs(pct)}% vs semana anterior</div>`;
  return '<div class="trend flat">≈ estável vs semana anterior</div>';
}
async function registrarPagamento(id){
  const l=LOJAS.find(x=>x.id===id); if(!l)return;
  const hoje=new Date().toISOString().slice(0,10);
  const ref=new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const {error}=await sb.from('portal_lojas').update({ultimo_pagamento:hoje,status_pagamento:'em_dia'}).eq('id',id);
  if(error){toast('Erro: '+error.message);return}
  // registra no histórico (não trava se falhar)
  try{ await sb.from('portal_pagamentos').insert({loja_id:id,valor:l.valor_mensal,data:hoje,referencia:ref}); }catch(e){}
  toast('Pagamento de '+l.nome+' registrado ✅ ('+ref+')');
  carregar();
}
async function toggleAtiva(id,novo){
  const {error}=await sb.from('portal_lojas').update({ativo:novo}).eq('id',id);
  if(error){toast('Erro: '+error.message);return}
  toast(novo?'Loja ligada ✅':'Loja desligada');
  carregar();
}

// ---------- detalhe da loja (o que você mostra pro cliente) ----------
function abrirDetalhe(id){
  const l=LOJAS.find(x=>x.id===id); if(!l)return;
  const meus=ACESSOS.filter(a=>a.loja_id===id);
  const dias=14, hoje=new Date(); hoje.setHours(0,0,0,0);
  const buckets=Array(dias).fill(0);
  meus.forEach(a=>{const d=new Date(a.criado_em);d.setHours(0,0,0,0);const i=dias-1-Math.round((hoje-d)/864e5);if(i>=0&&i<dias)buckets[i]++;});
  const max=Math.max(1,...buckets);
  const total30=(window.__cont||{})[id]||0;
  const total7=(window.__cont7||{})[id]||0;
  const hojeC=meus.filter(a=>{const d=new Date(a.criado_em);d.setHours(0,0,0,0);return +d===+hoje;}).length;
  const destino=l.destino_tipo==='whatsapp'?'entraram no grupo':(l.destino_tipo==='formulario'?'deixaram seus dados':'foram pro Instagram');

  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';
  bg.innerHTML=`<div class="modal det">
    <h2>${esc(l.nome)}</h2>
    <div class="dom">${l.dominio?'🌐 '+esc(l.dominio):'⚠️ sem domínio configurado'}${l.destino_tipo==='whatsapp'?' · 💬 grupo de WhatsApp':' · 📸 @'+esc(l.instagram||'')}</div>
    <div class="det-kpis">
      <div class="det-kpi"><div class="l">Hoje</div><div class="v">${hojeC}</div></div>
      <div class="det-kpi"><div class="l">7 dias</div><div class="v">${total7}</div></div>
      <div class="det-kpi"><div class="l">30 dias</div><div class="v">${total30}</div></div>
    </div>
    ${buckets.reduce((a,b)=>a+b,0)?`<div class="spark-wrap" style="margin:0 0 6px"><h3>Conexões por dia</h3><div class="spark">${buckets.map(v=>`<div class="bar" style="height:${Math.max(3,v/max*100)}%" title="${v}"></div>`).join('')}</div></div>`:'<div class="det-share">Ainda sem conexões registradas. Assim que o Wi-Fi começar a ser usado, os números aparecem aqui.</div>'}
    ${(l.responsavel||l.contato||l.documento||l.endereco)?`<div class="det-share" style="border-style:solid;border-color:var(--border)">📋 <b>Cadastro</b><br>${l.responsavel?'👤 '+esc(l.responsavel)+'<br>':''}${l.contato?'📱 '+esc(l.contato)+'<br>':''}${l.documento?'📄 '+esc(l.documento)+'<br>':''}${l.email_cliente?'✉️ '+esc(l.email_cliente)+'<br>':''}${l.endereco?'📍 '+esc(l.endereco):''}</div>`:''}
    <div class="det-share">📣 <b>Pra mostrar pro cliente:</b> "Nos últimos 30 dias, <b>${total30} pessoas</b> conectaram no seu Wi-Fi e ${destino}."</div>
    ${l.destino_tipo==='formulario'?`<div class="det-share" style="border-style:solid;border-color:var(--border)">📝 <b>Formulário de leads</b> — <span id="leadCount">carregando…</span><div style="margin-top:8px"><button class="btn sm primary" onclick="verLeads(${l.id},'${esc(l.nome)}')">Ver leads coletados</button> <button class="btn sm" onclick="baixarLeads(${l.id},'${esc(l.slug)}')">⬇️ Baixar CSV</button></div></div>`:''}
    ${l.valor_mensal?`<div class="det-share" style="border-style:solid;border-color:var(--border)">💰 <b>Cobrança:</b> R$ ${Number(l.valor_mensal).toLocaleString('pt-BR',{minimumFractionDigits:2})}/mês${l.dia_vencimento?', vence dia '+l.dia_vencimento:''} — <b class="trend ${statusCobranca(l).cls}" style="display:inline">${statusCobranca(l).txt}</b>${l.ultimo_pagamento?'<br>Último pagamento: '+l.ultimo_pagamento.split('-').reverse().join('/'):''}</div>`:''}
    <div class="modal-acts" style="margin-top:16px;flex-wrap:wrap">
      <button class="btn danger" onclick="excluir(${l.id})" style="margin-right:auto">🗑️ Excluir</button>
      ${(l.valor_mensal&&statusCobranca(l).txt!=='pago este mês')?`<button class="btn" onclick="registrarPagamento(${l.id});fecharModal()">✅ Recebi</button>`:''}
      <button class="btn ghost" onclick="copiarLinkCliente('${esc(l.slug)}','${esc(l.edit_token||'')}')">🔗 Link do cliente</button>
      <button class="btn ghost" onclick="fecharModal()">Fechar</button>
      <button class="btn primary" onclick="fecharModal();editar(${l.id})">✏️ Editar</button>
    </div>
  </div>`;
  bg.addEventListener('click',e=>{if(e.target===bg)fecharModal();});
  document.body.appendChild(bg);
}

const BASE_EDIT='https://abstabacaria.github.io/portal/painel-portais/editar.html';
function copiarLinkCliente(slug,token){
  if(!token){toast('Essa loja ainda não tem link. Rode o SQL do link mágico.');return;}
  const url=BASE_EDIT+'?loja='+encodeURIComponent(slug)+'&token='+encodeURIComponent(token);
  navigator.clipboard.writeText(url).then(()=>toast('🔗 Link copiado! Mande pro cliente personalizar o Wi-Fi dele.'))
    .catch(()=>prompt('Copie o link do cliente:',url));
}
async function verLeads(id,nome){
  const {data,error}=await sb.from('portal_leads').select('dados,criado_em').eq('loja_id',id).order('criado_em',{ascending:false}).limit(200);
  if(error){toast('Erro: '+error.message);return}
  const leads=data||[];
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg2';
  const linhas=leads.length?leads.map(l=>{
    const d=l.dados||{};
    const campos=Object.entries(d).map(([k,v])=>`<b>${esc(k)}:</b> ${esc(v)}`).join(' · ');
    return `<div style="padding:9px 0;border-bottom:1px solid var(--border);font-size:13px">${campos}<div style="font-size:10.5px;color:var(--text-faint);margin-top:2px">${new Date(l.criado_em).toLocaleString('pt-BR')}</div></div>`;
  }).join(''):'<div class="vazio" style="padding:30px"><div class="big">📝</div>Ainda nenhum lead coletado.</div>';
  bg.innerHTML=`<div class="modal"><h2>📝 Leads — ${esc(nome)}</h2><div class="hint">${leads.length} cadastro(s). Os mais recentes primeiro.</div><div style="max-height:50vh;overflow-y:auto">${linhas}</div><div class="modal-acts" style="margin-top:14px"><button class="btn ghost" onclick="document.getElementById('modalBg2').remove()">Fechar</button></div></div>`;
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
}
async function baixarLeads(id,slug){
  const {data,error}=await sb.from('portal_leads').select('dados,criado_em').eq('loja_id',id).order('criado_em',{ascending:false});
  if(error){toast('Erro: '+error.message);return}
  const leads=data||[];
  if(!leads.length){toast('Nenhum lead pra baixar ainda');return}
  const cols=[...new Set(leads.flatMap(l=>Object.keys(l.dados||{})))];
  const head=['data',...cols];
  const linhas=leads.map(l=>[new Date(l.criado_em).toLocaleString('pt-BR'),...cols.map(c=>(l.dados||{})[c]||'')]);
  const csv=[head,...linhas].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leads_'+slug+'.csv';a.click();
  toast('CSV baixado ✅');
}
async function contarLeads(id){
  try{const {count}=await sb.from('portal_leads').select('id',{count:'exact',head:true}).eq('loja_id',id);
    const el=document.getElementById('leadCount'); if(el)el.innerHTML='<b>'+(count||0)+'</b> cadastro(s) coletado(s)';}catch(e){}
}

const PRESETS=[
  ['#6366f1','#22d3ee'],['#ff6a1a','#ffb347'],['#22c55e','#a3e635'],
  ['#ec4899','#f9a8d4'],['#ef4444','#f97316'],['#0ea5e9','#6366f1'],
  ['#d4af37','#fde68a'],['#111827','#4b5563']
];
function previewPaleta(){
  const c1=document.getElementById('f_cor').value, c2=document.getElementById('f_cor2').value;
  const g=document.getElementById('pgrad'); if(g)g.style.background='linear-gradient(135deg,'+c1+','+c2+')';
}
function montarPresets(){
  const box=document.getElementById('presets'); if(!box)return;
  box.innerHTML=PRESETS.map(([a,b])=>`<div class="preset" style="background:linear-gradient(135deg,${a},${b})" onclick="aplicarPreset('${a}','${b}')" title="${a} → ${b}"></div>`).join('');
}
function aplicarPreset(a,b){
  document.getElementById('f_cor').value=a;
  document.getElementById('f_cor2').value=b;
  previewPaleta();
}
async function subirLogo(input){
  const file=input.files&&input.files[0]; if(!file)return;
  if(file.size>2*1024*1024){toast('Imagem muito grande (máx 2MB)');return}
  const st=document.getElementById('logoStatus'); st.textContent='Enviando…';
  const ext=(file.name.split('.').pop()||'png').toLowerCase();
  const nome='loja_'+Date.now()+'.'+ext;
  const {data,error}=await sb.storage.from('logos').upload(nome,file,{upsert:true,contentType:file.type});
  if(error){st.textContent='';toast('Erro no upload: '+error.message);return}
  const {data:pub}=sb.storage.from('logos').getPublicUrl(nome);
  const url=pub.publicUrl;
  document.getElementById('f_logo').value=url;
  const img=document.getElementById('logoPrev'); img.src=url; img.style.display='';
  document.getElementById('logoPlaceholder').style.display='none';
  st.textContent='Logo enviada ✅';
}
const CAMPOS_FORM=[
  {campo:'nome',label:'Nome',fixo:false},
  {campo:'telefone',label:'Telefone / WhatsApp',fixo:false},
  {campo:'email',label:'E-mail',fixo:false},
  {campo:'aniversario',label:'Aniversário',fixo:false},
  {campo:'cpf',label:'CPF',fixo:false},
  {campo:'cep',label:'CEP',fixo:false},
  {campo:'bairro',label:'Bairro',fixo:false},
];
let FORM_ATUAL=[];
function trocaDestino(){
  const t=document.getElementById('f_destino').value;
  document.getElementById('wrap_insta').style.display=t==='instagram'?'':'none';
  document.getElementById('wrap_wpp').style.display=t==='whatsapp'?'':'none';
  const wf=document.getElementById('wrap_form'); if(wf)wf.style.display=t==='formulario'?'':'none';
  if(t==='formulario')montarFormBuilder();
}
function montarFormBuilder(){
  const box=document.getElementById('formBuilder'); if(!box)return;
  box.innerHTML=CAMPOS_FORM.map(c=>{
    const sel=FORM_ATUAL.find(x=>x.campo===c.campo);
    const ativo=!!sel, obrig=sel&&sel.obrigatorio;
    return `<div class="fb-row ${ativo?'on':''}">
      <label class="fb-check"><input type="checkbox" ${ativo?'checked':''} onchange="toggleCampo('${c.campo}',this.checked)"> ${c.label}</label>
      <label class="fb-obrig" style="${ativo?'':'visibility:hidden'}"><input type="checkbox" ${obrig?'checked':''} onchange="toggleObrig('${c.campo}',this.checked)"> obrigatório</label>
    </div>`;
  }).join('');
}
function toggleCampo(campo,on){
  const c=CAMPOS_FORM.find(x=>x.campo===campo);
  if(on){ if(!FORM_ATUAL.find(x=>x.campo===campo))FORM_ATUAL.push({campo,label:c.label,obrigatorio:false}); }
  else FORM_ATUAL=FORM_ATUAL.filter(x=>x.campo!==campo);
  montarFormBuilder();
}
function toggleObrig(campo,on){
  const f=FORM_ATUAL.find(x=>x.campo===campo); if(f)f.obrigatorio=on;
}
function abrirNova(){abrirModal(null);}
function editar(id){abrirModal(LOJAS.find(l=>l.id===id));}

function abrirModal(l){
  const editando=!!l;
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';
  bg.innerHTML=`<div class="modal">
    <h2>${editando?'✏️ Editar loja':'➕ Nova loja'}</h2>
    <div class="hint">Esses dados alimentam o portal do cliente e o seu controle.</div>
    ${campos(l||{})}
    <div class="modal-acts">
      ${editando?`<button class="btn danger" onclick="excluir(${l.id})" style="margin-right:auto">🗑️ Excluir</button>`:''}
      <button class="btn ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn primary" onclick="salvar(${editando?l.id:'null'})">Salvar</button>
    </div>
  </div>`;
  bg.addEventListener('click',e=>{if(e.target===bg)fecharModal();});
  document.body.appendChild(bg);
  FORM_ATUAL=(l&&l.form_campos)?JSON.parse(JSON.stringify(l.form_campos)):[{campo:'nome',label:'Nome',obrigatorio:true},{campo:'telefone',label:'Telefone / WhatsApp',obrigatorio:true}];
  trocaDestino();
  montarPresets();
  previewPaleta();
}
function fecharModal(){const m=document.getElementById('modalBg');if(m)m.remove();}

async function salvar(id){
  const v=x=>document.getElementById('f_'+x).value.trim();
  const slug=v('slug').toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!v('nome')||!slug){toast('Nome e identificador são obrigatórios');return}
  const payload={
    nome:v('nome'),slug,dominio:v('dominio')||null,instagram:v('instagram').replace(/^@/,'')||null,
    responsavel:v('responsavel')||null,contato:v('contato')||null,documento:v('documento')||null,email_cliente:v('email')||null,endereco:v('endereco')||null,
    cor:v('cor'),cor2:v('cor2')||null,logo_url:v('logo')||null,codigo_wifi:v('codigo')||null,ap_secret:v('secret')||null,
    valor_mensal:v('valor')?parseFloat(v('valor')):null,dia_vencimento:v('diavenc')?parseInt(v('diavenc')):null,plano:v('plano')||null,obs:v('obs')||null,
    destino_tipo:document.getElementById('f_destino').value,
    whatsapp_link:v('wpp')||null,
    form_titulo:v('form_titulo')||null,
    form_campos:FORM_ATUAL.length?FORM_ATUAL:null
  };
  let error;
  if(id){({error}=await sb.from('portal_lojas').update(payload).eq('id',id));}
  else{({error}=await sb.from('portal_lojas').insert(payload));}
  if(error){toast('Erro: '+(error.message.includes('duplicate')?'esse identificador ou domínio já existe':error.message));return}
  toast(id?'Loja atualizada ✅':'Loja criada ✅');
  fecharModal();carregar();
}

async function excluir(id){
  if(!confirm('Excluir essa loja e todos os acessos dela? Não dá pra desfazer.'))return;
  const {error}=await sb.from('portal_lojas').delete().eq('id',id);
  if(error){toast('Erro: '+error.message);return}
  toast('Loja excluída');fecharModal();carregar();
}
